<ion-content fullscreen class="dashboard-screen">
  <div class="dashboard-container">
    
    <!-- Header -->
    <header class="dash-header">
      <h1>Estoque</h1>
      <div class="status-badge" style="background: rgba(251, 146, 60, 0.1); color: #fb923c; border: 1px solid rgba(251, 146, 60, 0.2);">
        <ion-icon name="alert-circle-outline" style="margin-right: 4px;"></ion-icon>
        2 Itens Baixos
      </div>
    </header>

    <!-- Stock Items -->
    <section class="latest-sales">
      <ion-card class="sales-list-card">
        <ion-list lines="full" class="dark-list">
          <ion-item>
            <div class="sale-icon" slot="start" style="background: rgba(156, 163, 175, 0.1);">
              <ion-icon name="cube-outline" style="color: #9ca3af;"></ion-icon>
            </div>
            <ion-label>
              <h3>Coca-Cola 2L</h3>
              <p>Cód: 7894900011517</p>
            </ion-label>
            <div slot="end" style="text-align: right;">
              <span style="display: block; font-weight: 700; color: #4ade80;">150 un</span>
              <span style="font-size: 0.75rem; color: #9ca3af;">R$ 8,50</span>
            </div>
          </ion-item>
          <ion-item>
            <div class="sale-icon" slot="start" style="background: rgba(251, 146, 60, 0.1);">
              <ion-icon name="alert-circle-outline" style="color: #fb923c;"></ion-icon>
            </div>
            <ion-label>
              <h3>Arroz 5kg</h3>
              <p>Cód: 7891234567890</p>
            </ion-label>
            <div slot="end" style="text-align: right;">
              <span style="display: block; font-weight: 700; color: #fb923c;">5 un</span>
              <span style="font-size: 0.75rem; color: #9ca3af;">R$ 25,90</span>
            </div>
          </ion-item>
        </ion-list>
      </ion-card>
    </section>

  </div>
</ion-content>
