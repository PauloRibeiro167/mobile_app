<div class="relative w-full">
  <ion-refresher
    class="pointer-events-auto opacity-0"
    slot="fixed"
    (ionStart)="handlePullStart()"
    (ionRefresh)="handleRefresh($event)"
  >
    <ion-refresher-content
      pullingIcon=""
      pullingText=""
      refreshingSpinner="null"
      refreshingText=""
    ></ion-refresher-content>
  </ion-refresher>

  <div
    class="pointer-events-none absolute inset-x-0 top-0 flex justify-center px-4 transition-all duration-300"
    [ngClass]="{
      'translate-y-0 opacity-100': isVisible,
      '-translate-y-3 opacity-0': !isVisible
    }"
  >
    <div
      class="flex min-h-16 w-full max-w-md flex-col items-center justify-center gap-2 rounded-b-2xl pt-6 pb-4 text-center transition-all duration-300"
      [ngClass]="{
        'bg-red-500/10 border-b border-red-500/20 text-red-500': status === 'error',
        'text-emerald-500': status === 'success',
        'text-zinc-400': status === 'idle' || status === 'refreshing'
      }"
    >
      <ng-container *ngIf="status === 'idle' || status === 'refreshing'">
        <p class="text-[0.65rem] font-semibold uppercase tracking-[0.18em]">
          {{ status === 'refreshing' ? 'Atualizando painel' : 'Puxe para atualizar' }}
        </p>

        <l-line-wobble
          [attr.size]="status === 'refreshing' ? '72' : '56'"
          [attr.stroke]="'4'"
          [attr.bg-opacity]="'.12'"
          [attr.speed]="status === 'refreshing' ? '1.2' : '1'"
          [attr.color]="'rgb(var(--app-color-primary-rgb))'"
        ></l-line-wobble>
      </ng-container>

      <ng-container *ngIf="status === 'success'">
        <div class="flex items-center justify-center gap-2 animate-bounce">
          <i class="bi bi-check-circle-fill text-xl text-emerald-500"></i>
          <span class="text-[0.7rem] font-bold uppercase tracking-[0.18em] text-emerald-500">
            Painel Atualizado!
          </span>
        </div>
      </ng-container>

      <ng-container *ngIf="status === 'error'">
        <div class="flex flex-col items-center justify-center gap-1 animate-pulse">
          <div class="flex items-center justify-center gap-2">
            <i class="bi bi-exclamation-triangle-fill text-lg text-red-500"></i>
            <span class="text-[0.7rem] font-bold uppercase tracking-[0.18em] text-red-500">
              Erro de Conexão
            </span>
          </div>
          <p class="text-[0.6rem] text-red-400/80 lowercase">
            Aguardando conexão ser restabelecida...
          </p>
        </div>
      </ng-container>
    </div>
  </div>
</div>
