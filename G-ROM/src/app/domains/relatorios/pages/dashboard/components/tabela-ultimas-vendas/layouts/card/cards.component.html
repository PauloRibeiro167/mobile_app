<section class="grid gap-3">
  <article
    *ngFor="let venda of vendas; trackBy: trackByVenda"
    class="cursor-pointer rounded-2xl border border-white/8 bg-[linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.015)),linear-gradient(135deg,rgba(13,19,24,0.92),rgba(9,15,20,0.96))] p-3.5 shadow-[inset_0_1px_0_rgba(255,255,255,0.04),0_16px_28px_rgba(7,12,18,0.2)] transition-colors hover:border-[rgba(var(--app-color-primary-rgb),0.22)] hover:bg-[linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.02)),linear-gradient(135deg,rgba(13,19,24,0.95),rgba(9,15,20,0.98))] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[rgba(var(--app-color-primary-rgb),0.35)]"
    role="button"
    tabindex="0"
    aria-label="Abrir detalhes da venda {{ venda.id }}"
    (click)="abrirDetalhesVenda(venda)"
    (keydown.enter)="abrirDetalhesVenda(venda)"
    (keydown.space)="abrirDetalhesVenda(venda); $event.preventDefault()"
  >
    <div class="flex items-start justify-between gap-3">
      <div class="min-w-0">
        <h3 class="truncate text-[1.3rem] font-black leading-none tracking-[-0.04em] text-zinc-50">
          {{ venda.id }}
        </h3>
        <p class="mt-1.5 truncate text-[13px] font-medium text-zinc-400">
          {{ venda.clienteLabel }}
        </p>
        <p class="mt-1 text-xs font-medium text-zinc-500">{{ venda.quantidadeItensLabel }}</p>
      </div>

      <span class="shrink-0 pt-0.5 text-[10px] font-medium text-zinc-500">
        {{ venda.horaLabel }}
      </span>
    </div>

    <div class="mt-3 grid grid-cols-2 gap-2.5">
      <div class="rounded-xl border border-white/6 bg-black/10 px-2.5 py-2.5">
        <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-zinc-500">
          Cliente
        </p>
        <p class="mt-1 truncate text-sm font-bold text-zinc-100">{{ venda.clienteLabel }}</p>
      </div>

      <div class="rounded-xl border border-white/6 bg-black/10 px-2.5 py-2.5">
        <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-zinc-500">
          Itens
        </p>
        <p class="mt-1 text-sm font-bold text-zinc-100">{{ venda.quantidadeItensLabel }}</p>
      </div>
    </div>

    <div class="mt-2.5 rounded-xl border border-white/8 bg-white/[0.035] px-2.5 py-2.5">
      <div class="flex items-center gap-2 text-zinc-500">
        <span
          class="h-px flex-1 bg-gradient-to-r from-transparent via-white/12 to-transparent shadow-[0_0_8px_rgba(255,255,255,0.05)]"
          [ngClass]="obterClasseLinhaPagamento(venda.tomPagamento)"
        ></span>
        <span
          class="inline-flex shrink-0 items-center gap-1 text-[8px] font-semibold uppercase tracking-[0.16em]"
          [ngClass]="obterClasseTituloPagamento(venda.tomPagamento)"
        >
          <i class="bi text-[8px] leading-none" [ngClass]="obterIconePagamento(venda.pagamentoLabel)"></i>
          {{ venda.pagamentoLabel }}
        </span>
        <span
          class="h-px flex-1 bg-gradient-to-l from-transparent via-white/12 to-transparent shadow-[0_0_8px_rgba(255,255,255,0.05)]"
          [ngClass]="obterClasseLinhaPagamento(venda.tomPagamento)"
        ></span>
      </div>

      <p class="mt-2.5 text-center text-[1.05rem] font-black leading-none tracking-[-0.03em] text-zinc-50">
        {{ venda.valorLabel }}
      </p>

      <div *ngIf="venda.pagamentoMetaLabel" class="mt-1.5 text-center">
        <span class="text-[11px] font-medium text-zinc-400">
          {{ venda.pagamentoMetaLabel }}
        </span>
      </div>
    </div>
  </article>
</section>
