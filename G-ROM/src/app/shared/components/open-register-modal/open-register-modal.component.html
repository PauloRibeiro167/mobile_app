<ion-modal
  [isOpen]="isOpen"
  [backdropDismiss]="!enviando"
  [showBackdrop]="true"
  [style.--background]="'transparent'"
  [style.--box-shadow]="'none'"
  [style.--backdrop-opacity]="0.72"
  (didDismiss)="close()"
>
  <ng-template>
    <div
      class="flex min-h-full items-center justify-center bg-black/70 p-3 backdrop-blur-[10px] sm:p-4 md:p-6"
      role="presentation"
    >
      <section
        class="flex w-full max-w-lg flex-col overflow-hidden rounded-[1.5rem] border border-white/10 bg-[linear-gradient(180deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02)),linear-gradient(135deg,rgba(13,19,24,0.98),rgba(9,15,20,0.99))] text-zinc-50 shadow-[0_24px_70px_rgba(0,0,0,0.45)]"
        role="dialog"
        aria-modal="true"
        aria-label="Conferência de abertura do caixa"
      >
        <div class="relative border-b border-white/6 px-4 pb-4 pt-5 md:px-5 md:pt-6">
          <div class="max-w-[calc(100%-3.5rem)] space-y-1">
            <p class="m-0 text-[0.72rem] pb-1 font-bold uppercase tracking-[0.14em] text-[var(--app-color-primary-light)]">
              Abertura do caixa
            </p>
            <h3 class="m-0 pb-1 text-[1.35rem] font-black tracking-[-0.04em] text-zinc-50">
              Liberar acesso ao PDV
            </h3>
            <p class="text-sm text-zinc-400">
              Informe o fundo de troco inicial para registrar a abertura do caixa antes de entrar no PDV.
            </p>
          </div>

          <button
            type="button"
            aria-label="Fechar abertura do caixa"
            class="absolute right-4 top-5 inline-flex h-9 w-9 items-center justify-center rounded-full bg-white/10 text-zinc-300 transition-colors hover:bg-white/15 hover:text-zinc-100 md:right-5 md:top-6"
            [disabled]="enviando"
            (click)="close()"
          >
            <i class="bi bi-x-lg text-sm"></i>
          </button>
        </div>

        <form
          class="grid gap-4 px-4 py-4 md:px-5 md:py-5"
          [formGroup]="aberturaForm"
          (ngSubmit)="submit()"
        >
          <div class="grid grid-cols-2 gap-3">
            <article class="rounded-2xl border border-white/8 bg-white/5 px-3 py-3">
              <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-zinc-500">Operador</p>
              <p class="mt-1 text-sm font-black text-zinc-50">{{ usuarioAtualLabel }}</p>
            </article>

            <article class="rounded-2xl border border-white/8 bg-white/5 px-3 py-3">
              <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-zinc-500">Horário</p>
              <p class="mt-1 inline-flex items-center gap-1 text-sm font-black text-zinc-50">
                <i class="bi bi-clock text-xs text-zinc-400"></i>
                {{ horarioAtualLabel }}
              </p>
            </article>
          </div>

          <label class="grid gap-2">
            <span class="text-[11px] font-semibold uppercase tracking-[0.14em] text-zinc-400">
              Fundo de troco
            </span>
            <input
              type="number"
              min="0"
              step="0.01"
              formControlName="fundoTroco"
              class="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-base font-bold text-zinc-50 outline-none transition focus:border-[rgba(var(--app-color-primary-rgb),0.35)] focus:ring-2 focus:ring-[rgba(var(--app-color-primary-rgb),0.18)]"
              placeholder="0,00"
            />
          </label>

          <div class="flex items-center justify-end gap-3 pt-1">
            <button
              type="button"
              class="inline-flex h-11 items-center justify-center rounded-2xl border border-white/10 px-4 text-sm font-semibold text-zinc-300 transition hover:bg-white/5"
              [disabled]="enviando"
              (click)="close()"
            >
              Cancelar
            </button>

            <button
              type="submit"
              class="inline-flex h-11 min-w-[11rem] items-center justify-center gap-2 rounded-xl bg-[linear-gradient(180deg,rgba(var(--app-color-primary-rgb),0.95),rgba(var(--app-color-primary-rgb),0.78))] px-4 text-sm font-bold text-gray-400 shadow-[0_12px_28px_rgba(var(--app-color-primary-rgb),0.24)] transition hover:brightness-105 disabled:cursor-not-allowed disabled:opacity-70"
              [disabled]="enviando"
            >
              <ion-spinner *ngIf="enviando" name="crescent"></ion-spinner>
              <span>{{ enviando ? 'Conferindo...' : 'Abrir caixa e entrar no PDV' }}</span>
            </button>
          </div>
        </form>
      </section>
    </div>
  </ng-template>
</ion-modal>
