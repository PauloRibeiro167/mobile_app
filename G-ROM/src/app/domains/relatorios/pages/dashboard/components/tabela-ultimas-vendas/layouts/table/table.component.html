<section class="overflow-hidden rounded-2xl border border-[rgba(var(--app-color-primary-rgb),0.1)] bg-[linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.015)),linear-gradient(135deg,rgba(13,19,24,0.92),rgba(9,15,20,0.96))] shadow-[inset_0_1px_0_rgba(255,255,255,0.04),0_16px_30px_rgba(7,12,18,0.2)]">
  <div class="grid gap-4 p-2 md:hidden">
    <article
      *ngFor="let venda of vendas; trackBy: trackByVenda"
      class="cursor-pointer rounded-xl border border-white/8 bg-white/[0.025] px-3 py-2.5 transition-colors hover:border-[rgba(var(--app-color-primary-rgb),0.2)] hover:bg-white/[0.04] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[rgba(var(--app-color-primary-rgb),0.35)]"
      role="button"
      tabindex="0"
      aria-label="Abrir detalhes da venda {{ venda.id }}"
      (click)="abrirDetalhesVenda(venda)"
      (keydown.enter)="abrirDetalhesVenda(venda)"
      (keydown.space)="abrirDetalhesVenda(venda); $event.preventDefault()"
    >
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0">
          <p class="text-[0.6rem] font-bold uppercase tracking-[0.16em] text-zinc-500">
            Venda
          </p>
          <p class="mt-1 truncate text-[1rem] font-black leading-none tracking-[-0.03em] text-zinc-50">
            {{ venda.id }}
          </p>
        </div>

        <div class="text-right">
          <p class="text-[0.6rem] font-bold uppercase tracking-[0.16em] text-zinc-500">
            Hora
          </p>
          <span class="mt-1 inline-flex items-center gap-1   text-[0.78rem] font-semibold text-zinc-300">
            <i class="bi bi-clock text-[0.7rem] leading-none mr-1 text-zinc-500"></i>
            {{ venda.horaLabel }}
          </span>
        </div>
      </div>

      <div class="mt-2 flex items-end justify-between gap-1">
        <div class="min-w-0">
          <p class="text-[0.6rem] font-bold uppercase tracking-[0.16em] text-zinc-500">
            Pagamento
          </p>
          <div class="mt-1 flex flex-col items-start gap-1">
            <span
              class="inline-flex rounded-full border px-2 py-1 text-[10px] font-semibold uppercase tracking-[0.12em]"
              [ngClass]="obterClasseBadgePagamento(venda.tomPagamento)"
            >
              {{ venda.pagamentoLabel }}
            </span>
            <span *ngIf="venda.pagamentoMetaLabel" class="text-[10px] font-medium text-zinc-400">
              {{ venda.pagamentoMetaLabel }}
            </span>
          </div>
        </div>

        <div class="shrink-0 text-right">
          <p class="text-[0.6rem] font-bold uppercase tracking-[0.16em] text-zinc-500">
            Valor
          </p>
          <p class="mt-1 text-[0.98rem] font-black leading-none tracking-[-0.03em] text-zinc-50">
            {{ venda.valorLabel }}
          </p>
        </div>
      </div>
    </article>
  </div>

  <div class="hidden overflow-x-auto md:block">
    <table class="w-full table-auto">
      <thead>
        <tr class="border-b border-white/6 text-left text-[11px] font-bold uppercase tracking-[0.16em] text-zinc-500">
          <th class="px-4 py-3.5">Venda</th>
          <th class="px-4 py-3.5">Hora</th>
          <th class="px-4 py-3.5 text-right">Valor</th>
          <th class="px-4 py-3.5">Pagamento</th>
        </tr>
      </thead>

      <tbody>
        <tr
          *ngFor="let venda of vendas; trackBy: trackByVenda"
          class="cursor-pointer border-b border-white/6 transition-colors hover:bg-white/[0.03] last:border-b-0"
          role="button"
          tabindex="0"
          aria-label="Abrir detalhes da venda {{ venda.id }}"
          (click)="abrirDetalhesVenda(venda)"
          (keydown.enter)="abrirDetalhesVenda(venda)"
          (keydown.space)="abrirDetalhesVenda(venda); $event.preventDefault()"
        >
          <td class="px-4 py-3.5 text-sm font-extrabold tracking-[-0.02em] text-zinc-100">
            {{ venda.id }}
          </td>

          <td class="px-4 py-3.5 text-sm font-medium text-zinc-400">
            <span class="inline-flex items-center gap-1.5">
              <i class="bi bi-clock text-[0.78rem] leading-none text-zinc-500"></i>
              {{ venda.horaLabel }}
            </span>
          </td>

          <td class="px-4 py-3.5 text-right text-sm font-black text-zinc-50">
            {{ venda.valorLabel }}
          </td>

          <td class="px-4 py-3.5">
            <div class="flex flex-col items-start gap-1">
              <span
                class="inline-flex rounded-full border px-2.5 py-1 text-[11px] font-semibold uppercase tracking-[0.14em]"
                [ngClass]="obterClasseBadgePagamento(venda.tomPagamento)"
              >
                {{ venda.pagamentoLabel }}
              </span>
              <span *ngIf="venda.pagamentoMetaLabel" class="text-[11px] font-medium text-zinc-400">
                {{ venda.pagamentoMetaLabel }}
              </span>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
