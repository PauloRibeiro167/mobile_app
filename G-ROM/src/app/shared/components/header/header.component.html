<ion-header class="ion-no-border bg-transparent">
  <ion-toolbar class="header-toolbar border-none bg-transparent">
    <!-- Botão Menu Lateral -->
    <ion-buttons slot="start">
      <app-menu-toggle-button class="mx-0.5"></app-menu-toggle-button>
    </ion-buttons>

    <!-- Título Central Dinâmico -->
    <ion-title>
      <div class="flex h-full items-center justify-center gap-2.5">
        <i
          class="text-[1.2rem] text-primary [text-shadow:0_0_10px_rgba(var(--app-color-primary-rgb),0.3)]"
          [ngClass]="['bi', icon]"
        ></i>
        <span
          class="bg-gradient-to-r from-[var(--app-color-on-surface)] to-[var(--app-color-on-surface-variant)] bg-clip-text text-[var(--app-type-title-sm)] font-extrabold tracking-[-0.5px] text-transparent"
        >
          {{ title }}
        </span>
      </div>
    </ion-title>

    <!-- Ações do Lado Direito -->
    <ion-buttons slot="end">
      <!-- Botão do Sino: O GATILHO DO MODAL -->
      <ng-container *ngIf="(unreadCount$ | async) ?? 0 as unreadCount">
        <ion-button
          id="open-notifications"
          class="header-action-btn notification-btn group"
          aria-label="Abrir notificações"
        >
          <span
            class="notification-btn__surface relative z-[1] inline-flex h-9 w-9 items-center justify-center rounded-[12px] border border-[rgba(var(--app-color-primary-rgb),0.12)] bg-[linear-gradient(180deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02)),rgba(14,20,27,0.72)] shadow-[inset_0_1px_0_rgba(255,255,255,0.06),0_12px_24px_rgba(6,10,16,0.22)] backdrop-blur-[14px] transition-[transform,border-color,box-shadow,background] duration-200 ease-in-out"
            aria-hidden="true"
          >
            <i
              class="notification-btn__icon bi bi-bell-fill relative z-[1] text-[0.95rem] leading-none text-primary [text-shadow:0_0_12px_rgba(var(--app-color-primary-rgb),0.2)]"
            ></i>
            <span class="notification-badge" *ngIf="unreadCount > 0">
              {{ unreadCount > 99 ? '99+' : unreadCount }}
            </span>
          </span>
        </ion-button>
      </ng-container>

      <!-- Modal de Notificações Declarativo -->
      <ion-modal
        #modal
        trigger="open-notifications"
        [presentingElement]="presentingElement"
        [initialBreakpoint]="0.75"
        [breakpoints]="[0, 0.75, 1]"
        [handle]="true"
        class="notifications-modal-sheet"
      >
        <ng-template>
          <app-notifications-center></app-notifications-center>
        </ng-template>
      </ion-modal>
    </ion-buttons>
  </ion-toolbar>

  <!-- Linha de Acento Neon Inferior -->
  <div class="h-px w-full bg-[linear-gradient(to_right,transparent,rgba(var(--app-color-primary-rgb),0.5),rgba(var(--app-color-primary-rgb),0.8),rgba(var(--app-color-primary-rgb),0.5),transparent)] shadow-[0_1px_10px_rgba(var(--app-color-primary-rgb),0.2)]"></div>
</ion-header>
