<section
  class="grid gap-2.5"
  [style.grid-template-columns]="gridTemplateColumns"
>
  <article
    *ngFor="let venda of vendas; trackBy: trackByVenda"
    class="flex min-h-full min-w-0 cursor-pointer flex-col rounded-2xl border border-[rgba(var(--app-color-primary-rgb),0.12)] bg-[linear-gradient(180deg,rgba(255,255,255,0.035),rgba(255,255,255,0.015)),linear-gradient(145deg,rgba(10,16,21,0.96),rgba(13,19,24,0.92))] px-3 py-3 shadow-[inset_0_1px_0_rgba(255,255,255,0.05),0_14px_26px_rgba(7,12,18,0.18)] transition-colors hover:border-[rgba(var(--app-color-primary-rgb),0.22)] hover:bg-[linear-gradient(180deg,rgba(255,255,255,0.045),rgba(255,255,255,0.02)),linear-gradient(145deg,rgba(10,16,21,0.98),rgba(13,19,24,0.94))] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[rgba(var(--app-color-primary-rgb),0.35)]"
    role="button"
    tabindex="0"
    aria-label="Abrir detalhes da venda {{ venda.id }}"
    (click)="abrirDetalhesVenda(venda)"
    (keydown.enter)="abrirDetalhesVenda(venda)"
    (keydown.space)="abrirDetalhesVenda(venda); $event.preventDefault()"
  >
    <div class="flex items-start justify-between gap-3">
      <span class="min-w-0 truncate text-[1.15rem] font-black tracking-[-0.04em] text-zinc-50">
        {{ venda.id }}
      </span>
      <span class="shrink-0 pt-0.5 text-[10px] font-medium text-zinc-500">
        {{ venda.horaLabel }}
      </span>
    </div>

    <p class="mt-1 truncate text-[12px] font-medium text-zinc-400">
      {{ venda.clienteLabel }}
    </p>

    <div class="mt-2 flex items-center gap-2 text-zinc-500">
      <span
        class="h-px flex-1 bg-gradient-to-r from-transparent via-white/12 to-transparent shadow-[0_0_8px_rgba(255,255,255,0.05)]"
        [ngClass]="obterClasseLinhaPagamento(venda.tomPagamento)"
      ></span>
      <span
        class="inline-flex shrink-0 items-center gap-1 text-[8px] font-semibold uppercase tracking-[0.16em]"
        [ngClass]="obterClasseTituloPagamento(venda.tomPagamento)"
      >
        <i class="bi text-[8px] leading-none" [ngClass]="obterIconePagamento(venda.pagamentoLabel)"></i>
        {{ venda.pagamentoLabel }}
      </span>
      <span
        class="h-px flex-1 bg-gradient-to-l from-transparent via-white/12 to-transparent shadow-[0_0_8px_rgba(255,255,255,0.05)]"
        [ngClass]="obterClasseLinhaPagamento(venda.tomPagamento)"
      ></span>
    </div>

    <div class="mt-3 rounded-xl border border-white/8 bg-white/[0.035] px-3 py-2.5">
      <p class="text-[10px] font-semibold uppercase tracking-[0.14em] text-zinc-500">
        Valor
      </p>
      <p class="mt-2 truncate text-center text-[1rem] font-black leading-none tracking-[-0.03em] text-zinc-50 min-[360px]:text-[1.1rem] min-[420px]:text-[1.18rem]">
        {{ venda.valorLabel }}
      </p>
    </div>

    <p *ngIf="venda.pagamentoMetaLabel" class="mt-2 text-[10px] font-medium text-zinc-400">
      {{ venda.pagamentoMetaLabel }}
    </p>
  </article>
</section>
