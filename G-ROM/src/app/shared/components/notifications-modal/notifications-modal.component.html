<ion-header class="ion-no-border premium-header">
  <ion-toolbar class="premium-toolbar">
    <div class="header-content flex-center">
      <div class="header-text text-center">
        <h6><i class="bi bi-bell mr-2"></i> Notificações</h6>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<div class="modal-body-wrapper">
  <!-- Ações Globais -->
  <div class="top-actions" *ngIf="(notifications$ | async)?.length">
    <button
      (click)="clearAll()"
      class="soft-action danger"
      aria-label="Limpar todas"
    >
      <i class="bi bi-trash3"></i>
    </button>
  </div>

  <!-- Área de Scroll -->
  <div class="scroll-container">
    <div class="p-4 gap-4">

      <!-- Estado Vazio -->
      <div class="empty-state" *ngIf="!(notifications$ | async)?.length">
        <div class="empty-icon-wrapper">
          <i class="bi bi-bell"></i>
        </div>
        <h2>Tudo em dia</h2>
        <p>Você não possui notificações pendentes no momento.</p>
      </div>

      <!-- Iteração de Itens -->
      <div
        *ngFor="let notify of notifications$ | async; trackBy: trackByFn"
        class="notification-item-card rounded-md p-2"
        [class.is-unread]="!notify.read"
        [class.is-read]="notify.read"
        [class]="getPriorityClass(notify)"
      >
        <div class="card-icon-aside" [ngClass]="getTypeClass(notify.type)">
          <i [class]="'bi ' + getIcon(notify.type)"></i>
        </div>

        <div class="card-main-text">
          <div class="card-top-info">
            <h3 class="card-title-text">{{ notify.title }}</h3>
            <span class="card-meta">
              <span class="card-timestamp">{{
                notify.timestamp | date : "HH:mm"
              }}</span>
            </span>
          </div>
          <p class="card-description">{{ notify.body }}</p>

          <div class="card-footer">
            <div class="card-actions" *ngIf="!notify.read">
            </div>

            <div class="card-read-label" *ngIf="notify.read">
              <i class="bi bi-check-all"></i> Visualizada
            </div>
          </div>
        </div>
      </div>

      <!-- Espaçador final para garantir que o último item seja scrollável -->
      <div class="scroll-spacer"></div>
    </div>
  </div>
</div>
