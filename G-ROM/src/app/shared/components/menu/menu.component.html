<ion-menu contentId="main-content" type="overlay" class="premium-menu">
  <ion-content class="menu-content">
    <div class="flex min-h-full flex-col md:min-h-0">
      <!-- Botão Fechar FIXO -->
      <div slot="fixed" class="close-container">
        <app-menu-toggle-button
          mode="close"
          tone="neutral"
          ariaLabel="Fechar menu"
          (pressed)="closeMenu()"
        ></app-menu-toggle-button>
      </div>

      <!-- Perfil do Usuário Compacto (Vindo do UserService) -->
      <div
        class="relative overflow-hidden px-4 pb-0 pt-[calc(var(--ion-safe-area-top,0px)+1.5rem)] max-[480px]:px-[14px] max-[480px]:pb-[14px] max-[480px]:pt-[calc(var(--ion-safe-area-top,0px)+1.25rem)]"
        *ngIf="userProfile$ | async as user"
      >
        <div
          class="pointer-events-none absolute -left-10 -top-10 h-[100px] w-[100px] bg-[#00ff88] opacity-[0.08] blur-[45px]"
        ></div>

        <div class="mb-2 flex items-center gap-3">
          <ion-avatar
            class="h-[42px] w-[42px] shrink-0 border-[1.5px] border-[#00ff88] bg-[rgba(0,255,136,0.05)] p-[2px] shadow-[0_6px_15px_rgba(0,255,136,0.1)]"
          >
            <img [src]="user.avatarUrl" [alt]="user.nome" />
          </ion-avatar>

          <div class="min-w-0">
            <h3 class="mb-0.5 max-w-[130px] truncate text-[0.95rem] font-extrabold tracking-[-0.2px] text-white">
              {{ user.nome }}
            </h3>
            <span
              class="inline-block rounded border border-[rgba(0,255,136,0.1)] bg-[rgba(0,255,136,0.08)] px-1.5 py-px text-[0.5rem] font-black uppercase tracking-[0.05em] text-[#00ff88]"
            >
              {{ user.cargo }}
            </span>
          </div>
        </div>
      </div>

      <!-- Lista de Navegação -->
      <div class="flex-1 min-h-0 overflow-y-auto overscroll-contain pb-[calc(var(--app-safe-area-bottom-effective,0px)+7.5rem)] max-[768px]:block max-[768px]:min-h-auto max-[768px]:overflow-visible">
        <ion-list lines="none" class="m-0 bg-transparent p-6 px-[10px] max-[480px]:px-2 max-[768px]:block">
          <ng-container *ngIf="session$ | async as session">
            <ng-container *ngFor="let section of buildMenuSections(session.availableViews)">
              <div class="mb-3 border-b border-gray-800 px-5 pb-1.5 pt-4 text-[0.55rem] font-extrabold uppercase tracking-[0.15em] text-zinc-700">
                {{ section.title }}
              </div>

              <ion-item
                *ngFor="let view of section.items"
                button
                detail="false"
                class="menu-item"
                [class.active]="isActiveRoute(view.route)"
                [routerLink]="view.route"
                (click)="closeMenu()"
              >
                <i [ngClass]="view.icon" slot="start"></i>
                <ion-label>{{ view.title }}</ion-label>
              </ion-item>
            </ng-container>
          </ng-container>
        </ion-list>
      </div>

      <div class="fixed bottom-0 left-0 z-[20] w-[min(20rem,calc(100vw-1rem))] max-w-[calc(100vw-0.75rem)] bg-[#111418] max-[480px]:w-[min(18.5rem,calc(100vw-0.5rem))] max-[480px]:max-w-[calc(100vw-0.5rem)]" *ngIf="dashboardData$ | async as dash">
        <div class="menu-footer-inner px-4 pt-3 sm:px-5">
          <button
            type="button"
            (click)="logout()"
            class="flex w-full items-center justify-center gap-3 rounded-xl border border-red-500/20 bg-red-500/10 px-4 py-3 text-sm font-semibold text-red-400 transition hover:bg-red-500/15 active:scale-[0.99]"
          >
            <i class="bi bi-box-arrow-right text-base"></i>
            <span>Sair</span>
          </button>

          <div class="mt-3 text-center text-[0.5rem] font-bold uppercase tracking-[0.1em] text-zinc-500">
            v{{ dash.appVersao }} - MercadoApp
          </div>
        </div>
      </div>
    </div>
  </ion-content>
</ion-menu>
