<ion-content fullscreen class="profile-page">
  <app-tab-bar
    [activeTab]="activeTab"
    (tabChange)="setActiveTab($event)"
  ></app-tab-bar>

  <main class="page-container p-5 pb-20">
    <section class="tab-panel" *ngIf="activeTab === 'perfil'">
      <app-perfil-tab
        [userProfile]="userProfile"
        (editProfile)="editProfile()"
      ></app-perfil-tab>

      <section
        *ngIf="currentSession as session"
        class="mt-4 rounded-3xl border border-white/10 bg-[rgba(9,16,24,0.92)] p-4 text-white shadow-[0_18px_45px_rgba(0,0,0,0.24)]"
      >
        <div class="flex flex-col gap-4">
          <div>
            <h3 class="text-lg font-bold">Perfis e permissões da sessão</h3>
            <p class="mt-1 text-sm text-zinc-400">
              Aqui você visualiza a separação entre o cargo do usuário e os acessos efetivos liberados na aplicação.
            </p>
          </div>

          <div>
            <div class="text-xs font-bold uppercase tracking-[0.16em] text-zinc-500">Perfis</div>
            <div class="mt-2 flex flex-wrap gap-2">
              <span *ngFor="let profile of session.profileNames" class="rounded-full border border-fuchsia-400/20 bg-fuchsia-400/10 px-2 py-1 text-xs text-fuchsia-100">
                {{ profile }}
              </span>
            </div>
          </div>

          <div>
            <div class="text-xs font-bold uppercase tracking-[0.16em] text-zinc-500">Views liberadas</div>
            <div class="mt-2 flex flex-wrap gap-2">
              <span *ngFor="let view of session.availableViews" class="rounded-full border border-sky-400/20 bg-sky-400/10 px-2 py-1 text-xs text-sky-100">
                {{ view.title }}
              </span>
            </div>
          </div>

          <div>
            <div class="text-xs font-bold uppercase tracking-[0.16em] text-zinc-500">Permissões efetivas</div>
            <div class="mt-2 flex flex-wrap gap-2">
              <span *ngFor="let permission of session.permissions" class="rounded-full border border-white/10 px-2 py-1 text-xs text-zinc-200">
                {{ permission }}
              </span>
            </div>
          </div>
        </div>
      </section>
    </section>

    <section class="tab-panel pb-20" *ngIf="activeTab === 'desempenho'">
      <app-desempenho-tab></app-desempenho-tab>
    </section>

    <section class="tab-panel pb-20" *ngIf="activeTab === 'acompanhamento'">
      <app-acompanhamento-tab></app-acompanhamento-tab>
    </section>

    <section class="tab-panel pb-20" *ngIf="activeTab === 'conquistas'">
      <app-conquistas-tab></app-conquistas-tab>
    </section>
  </main>

  <app-modal #modalRef [isInline]="true"></app-modal>
</ion-content>
