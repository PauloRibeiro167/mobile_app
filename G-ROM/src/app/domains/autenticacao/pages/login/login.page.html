<ion-content fullscreen class="page-screen">
  <div class="login-page safe-area-horizontal">
    <div class="login-page__ambient" aria-hidden="true"></div>
    <div class="login-page__glow login-page__glow--primary"></div>
    <div class="login-page__glow login-page__glow--secondary"></div>

    <div class="login-shell">
      <app-login-hero
        [title]="title"
        [subtitle]="'Centralize o caixa e acompanhe o turno com mais clareza.'"
        [demoEmail]="DEFAULT_USER.email"
        [demoPassword]="DEFAULT_USER.password"
      ></app-login-hero>

      <app-login-form-card class="form_login"
        [email]="email"
        [password]="password"
        [rememberMe]="rememberMe"
        [isLoading]="isLoading"
        [showPassword]="showPassword"
        (emailChange)="email = $event"
        (passwordChange)="password = $event"
        (rememberMeChange)="rememberMe = $event"
        (togglePassword)="togglePasswordVisibility()"
        (forgotPassword)="forgotPassword()"
        (submitLogin)="login()"
      ></app-login-form-card>

      <section class="w-full max-w-[26rem] rounded-[1.75rem] border border-white/10 bg-[rgba(10,18,25,0.72)] p-4 text-white shadow-[0_24px_70px_rgba(0,0,0,0.24)] backdrop-blur-xl">
        <div class="flex items-center justify-between gap-3">
          <div>
            <h2 class="text-sm font-black uppercase tracking-[0.18em] text-emerald-300">Usuários de simulação</h2>
            <p class="mt-2 text-sm text-zinc-300">Escolha um cenário para testar perfil, permissões extras e separação de views.</p>
          </div>
        </div>

        <div class="mt-4 grid gap-3">
          <button
            *ngFor="let user of mockUsers"
            type="button"
            class="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-left transition hover:border-emerald-400/30 hover:bg-emerald-400/10"
            (click)="fillMockUser(user)"
          >
            <div class="flex items-center justify-between gap-3">
              <div>
                <div class="text-sm font-bold text-white">{{ user.nome }}</div>
                <div class="mt-1 text-xs uppercase tracking-[0.16em] text-zinc-400">{{ user.cargo }}</div>
              </div>

              <span class="rounded-full border border-white/10 px-2 py-1 text-[0.65rem] font-semibold text-zinc-300">
                {{ user.profiles.join(' + ') }}
              </span>
            </div>

            <p class="mt-2 text-xs leading-5 text-zinc-400">{{ user.situacao }}</p>
          </button>
        </div>
      </section>
    </div>
  </div>
</ion-content>
